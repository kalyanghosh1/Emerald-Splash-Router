server {
    server_name ciel.sryze.cc;
    client_max_body_size 100M;

    # Storage optimization: Disable access logs
    access_log off;
    error_log /var/log/nginx/error.log warn;

    # Root location for FastAPI
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Disable buffering for streaming (SSE)
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        proxy_connect_timeout 86400s;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/ciel.sryze.cc/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/ciel.sryze.cc/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}
server {
    if ($host = ciel.sryze.cc) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    server_name ciel.sryze.cc;
    client_max_body_size 100M;
    return 404; # managed by Certbot


}